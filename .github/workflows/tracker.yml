name: GitHub Projects Automation

on:
  pull_request:
    types: [closed]

jobs:
  move-issue-to-done:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Extract issue number
        id: extract
        run: |
          echo "PR body:"
          echo "${{ github.event.pull_request.body }}"

          ISSUE_NUMBER=$(echo "${{ github.event.pull_request.body }}" | grep -oE '#[0-9]+' | head -n 1 | tr -d '#')

          echo "Issue number: $ISSUE_NUMBER"

          echo "issue=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

      - name: Close issue using curl
        if: steps.extract.outputs.issue != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X PATCH \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.extract.outputs.issue }} \
            -d '{"state":"closed"}'
